name: Aggiornamento automatico dati Gloob

on:
  workflow_dispatch: {}
  schedule:
    - cron: "45 21 * * 1-5"

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run update script
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: |
          python update_data.py

      - name: Show last rows (diagnostica)
        if: always()
        run: |
          echo "---- data/ls80.csv ----"
          tail -n 8 data/ls80.csv || true
          echo "---- data/gold.csv ----"
          tail -n 8 data/gold.csv || true
          echo "---- data/btc.csv ----"
          tail -n 8 data/btc.csv || true
          echo "---- data/world.csv ----"
          tail -n 8 data/world.csv || true

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.csv
          if git diff --cached --quiet; then
            echo "Nessun aggiornamento dati"
            exit 0
          fi
          git commit -m "Aggiorna dati variante Pigro 80-15-5 (ls80/gold/btc/world)"
          git push
