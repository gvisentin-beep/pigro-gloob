name: Aggiornamento automatico dati Gloob

on:
  workflow_dispatch: {}
  schedule:
    - cron: "15 23 * * *"  # ogni giorno 23:15 UTC (~00:15 Italia)

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance requests

      - name: Run update script
        run: |
          python update_data.py

      - name: Show last rows (diagnostica)
        run: |
          echo "LS80 last rows:"
          tail -n 5 data/ls80.csv || true
          echo "GOLD last rows:"
          tail -n 5 data/gold.csv || true

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.csv
          if git diff --cached --quiet; then
            echo "Nessun aggiornamento dati"
            exit 0
          fi
          git commit -m "Auto-update dati Gloob (ls80/gold)"
          git pull --rebase
          git push

      - name: Trigger Render Deploy Hook (non bloccare se fallisce)
        continue-on-error: true
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK}" ]; then
            echo "RENDER_DEPLOY_HOOK non presente: skip"
            exit 0
          fi
          echo "Chiamo Deploy Hook Render..."
          curl -sS -X POST "${RENDER_DEPLOY_HOOK}" || true
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
