name: Aggiornamento automatico dati Gloob

on:
  workflow_dispatch: {}
  schedule:
    - cron: "45 21 * * 1-5"

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest

    env:
      LS80_TICKER: VNGA80.MI
      GOLD_TICKER: SGLD.MI
      WORLD_TICKER: SMSWLD.MI

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run update script
        run: |
          python update_data.py

      - name: Show last rows (diagnostica)
        run: |
          echo "---- data/ls80.csv ----"
          tail -n 8 data/ls80.csv || true
          echo "---- data/gold.csv ----"
          tail -n 8 data/gold.csv || true
          echo "---- data/world.csv ----"
          tail -n 8 data/world.csv || true

      - name: Commit and push if data changed
        run: |
          if git status --porcelain | grep -qE 'data/ls80.csv|data/gold.csv|data/world.csv'; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/ls80.csv data/gold.csv data/world.csv
            git commit -m "Aggiorna dati (ls80/gold/world)"
            git push
          else
            echo "Nessuna modifica ai dati."
          fi
