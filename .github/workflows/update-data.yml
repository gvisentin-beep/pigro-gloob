name: Update portfolio data

on:
  schedule:
    - cron: "15 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run updater
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          LS80_TICKER: ${{ secrets.LS80_TICKER }}
          GOLD_TICKER: ${{ secrets.GOLD_TICKER }}
          BTC_TICKER: ${{ secrets.BTC_TICKER }}
          WORLD_TICKER: ${{ secrets.WORLD_TICKER }}
          MIB_TICKER: ${{ secrets.MIB_TICKER }}
          SP500_TICKER: ${{ secrets.SP500_TICKER }}
        run: |
          python update_data.py

      - name: Commit updated CSV files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.csv
          git diff --cached --quiet || git commit -m "Auto update portfolio data"
          git push
