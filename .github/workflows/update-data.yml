name: Update portfolio data

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install yfinance

      - name: Run updater
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          GOLD_TICKER: ${{ secrets.GOLD_TICKER }}
          BTC_TICKER: ${{ secrets.BTC_TICKER }}
          WORLD_TICKER: ${{ secrets.WORLD_TICKER }}
        run: |
          python update_data.py

      - name: Sync CSV files to static
        run: |
          cp data/btc.csv static/data_btc.csv
          cp data/gold.csv static/data_gold.csv
          cp data/ls80.csv static/data_ls80.csv
          if [ -f data/mib.csv ]; then cp data/mib.csv static/data_mib.csv; else echo "data/mib.csv non presente, salto copia"; fi
          cp data/sp500.csv static/data_sp500.csv
          cp data/world.csv static/data_world.csv

      - name: Commit updated CSV files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.csv static/data_*.csv
          git diff --cached --quiet || git commit -m "Auto update portfolio data"
          git push
