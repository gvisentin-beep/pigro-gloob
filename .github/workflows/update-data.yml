name: Aggiornamento automatico dati Gloob

on:
  workflow_dispatch: {}
  schedule:
    - cron: "15 23 * * *"  # ogni giorno 23:15 UTC (~00:15 Italia)

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance requests

      - name: Run update script
        env:
          # ✅ stessi ticker del Render (se li imposti come repo variables/secrets è perfetto)
          LS80_TICKER: ${{ vars.LS80_TICKER }}
          GOLD_TICKER: ${{ vars.GOLD_TICKER }}
        run: |
          python update_data.py

      - name: Debug tail CSV
        run: |
          echo "---- data/ls80.csv (tail) ----"
          tail -n 5 data/ls80.csv || true
          echo "---- data/gold.csv (tail) ----"
          tail -n 5 data/gold.csv || true

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.csv
          if git diff --cached --quiet; then
            echo "Nessun aggiornamento dati"
            exit 0
          fi
          git commit -m "Auto-update dati Gloob (ls80/gold)"
          git pull --rebase
          git push

      - name: Trigger Render deploy (optional)
        if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
