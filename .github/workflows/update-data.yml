name: Aggiornamento automatico dati Gloob

on:
  workflow_dispatch: {}
  schedule:
    - cron: "45 21 * * 1-5"  # 22:45 ora italiana circa (UTC)

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance requests

      - name: Run update script
        run: |
          python update_data.py

      - name: Show last dates (diagnostica)
        run: |
          echo "LS80 last row:"
          tail -n 3 data/ls80.csv || true
          echo "GOLD last row:"
          tail -n 3 data/gold.csv || true

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.csv
          if git diff --cached --quiet; then
            echo "Nessun aggiornamento dati"
            exit 0
          fi
          git commit -m "Auto-update dati Gloob (ls80/gold)"
          git push

      - name: Trigger Render Deploy (forza aggiornamento sito)
        if: success()
        run: |
          curl -X POST "$RENDER_DEPLOY_HOOK"
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
