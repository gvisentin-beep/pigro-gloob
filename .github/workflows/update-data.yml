def now_utc() -> str:
    return datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M:%S UTC")


def log(msg: str) -> None:
    print(msg, flush=True)


def read_existing_csv(path: Path) -> Optional[pd.DataFrame]:
    if not path.exists():
        return None

    df = pd.read_csv(path, sep=";", dtype=str)
    df.columns = ["date", "close"]

    df["date"] = pd.to_datetime(df["date"], dayfirst=True, errors="coerce")
    df["close"] = pd.to_numeric(df["close"].str.replace(",", "."), errors="coerce")

    df = df.dropna().sort_values("date").drop_duplicates("date")

    return df if not df.empty else None


def write_csv(path: Path, df: pd.DataFrame) -> None:
    path.parent.mkdir(parents=True, exist_ok=True)

    df = df.sort_values("date").drop_duplicates("date")
    df["date"] = df["date"].dt.strftime("%d/%m/%Y")

    df.to_csv(path, sep=";", index=False)


# ✅ NUOVA FUNZIONE YAHOO
def fetch_series_yahoo(symbol: str):
    try:
        df = yf.download(symbol, period="max", interval="1d", progress=False)

        if df.empty:
            return None, "Yahoo vuoto"

        df = df.reset_index()[["Date", "Close"]]
        df.columns = ["date", "close"]

        df["date"] = pd.to_datetime(df["date"])
        df["close"] = pd.to_numeric(df["close"], errors="coerce")

        df = df.dropna().sort_values("date")

        return df, None

    except Exception as e:
        return None, str(e)


def fetch_series_twelve(symbol: str):
    if not TWELVE_DATA_API_KEY:
        return None, "API key mancante"

    params = {
        "symbol": symbol,
        "interval": "1day",
        "outputsize": 5000,
        "apikey": TWELVE_DATA_API_KEY,
    }

    try:
        resp = requests.get(TWELVE_DATA_BASE_URL, params=params)
        data = resp.json()

        values = data.get("values")
        df = pd.DataFrame(values)

        df["date"] = pd.to_datetime(df["datetime"])
        df["close"] = pd.to_numeric(df["close"])

        return df[["date", "close"]], None

    except Exception as e:
        return None, str(e)


def update_asset(name, cfg):
    symbol = cfg["symbol"]
    path = cfg["path"]
    source = cfg["source"]

    log(f"\n{name.upper()} - {symbol}")

    existing = read_existing_csv(path)

    if source == "yahoo":
        fresh, err = fetch_series_yahoo(symbol)
    else:
        fresh, err = fetch_series_twelve(symbol)

    if fresh is None:
        log(f"Errore: {err}")
        return existing is not None

    merged = (
        pd.concat([existing, fresh]) if existing is not None else fresh
    )

    merged = merged.drop_duplicates("date").sort_values("date")

    write_csv(path, merged)

    log(f"Aggiornato: {len(merged)} righe")
    return True


def main():
    log("=== AGGIORNAMENTO DATI ===")

    for name, cfg in ASSETS.items():
        if cfg["update_enabled"]:
            update_asset(name, cfg)

    log("=== FINE ===")


if __name__ == "__main__":
    main()
