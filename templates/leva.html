<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confronto Pigro vs Pigro Leva</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 22px;
      color: #111;
      background: #fff;
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
    }

    h1 {
      font-size: 20px;
      margin: 0 0 18px 0;
      font-weight: 700;
    }

    .chart-box,
    .metrics-box {
      margin-top: 18px;
      padding: 14px;
      border: 1px solid #d9d9d9;
      border-radius: 10px;
      background: #fff;
    }

    .chart-box canvas {
      width: 100% !important;
      height: 420px !important;
      display: block;
    }

    .metrics-box {
      line-height: 1.6;
      font-size: 15px;
    }

    .top-note {
      font-size: 13px;
      color: #555;
      margin-bottom: 8px;
    }

    @media (max-width: 900px) {
      body {
        margin: 14px;
      }

      h1 {
        font-size: 18px;
      }

      .chart-box canvas {
        height: 320px !important;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Confronto Portafoglio Pigro vs Pigro Leva 20%</h1>

    <div class="chart-box">
      <canvas id="chart"></canvas>
    </div>

    <div class="chart-box">
      <canvas id="drawdownChart"></canvas>
    </div>

    <div id="metrics" class="metrics-box">
      <div class="top-note">Caricamento risultati in corso…</div>
    </div>
  </div>

  <script src="/static/app_leva.js"></script>
</body>
</html>
