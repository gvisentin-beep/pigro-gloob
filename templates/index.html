<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gloob — Metodo Pigro 80/15/5</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>

<style>
body{font-family:Arial; margin:0;}
.wrap{max-width:1100px; margin:auto; padding:10px 20px;}

h1{color:#173a8a;}

.introTop{
  display:grid;
  grid-template-columns:1fr 390px;
  gap:14px;
}

@media(max-width:900px){
  .introTop{grid-template-columns:1fr;}
}

.heroVideo{
  width:100%;
  border-radius:14px;
}

.controlsRow{
  display:flex;
  gap:16px;
  align-items:flex-end;
  flex-wrap:wrap;
}

.btn{
  background:#132c74;
  color:#fff;
  border:none;
  border-radius:8px;
  padding:8px 14px;
  cursor:pointer;
}

.card{
  border:1px solid #ddd;
  border-radius:10px;
  padding:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="wrap">

<!-- HEADER -->
<h1>Gloob</h1>
<div><b>Metodo Pigro — Variante 80/15/5</b></div>

<div class="introTop">

<div>
<ul>
<li><b>Pochi strumenti</b>: LifeStrategy 80, Oro, Bitcoin</li>
<li><b>Controllo del rischio</b>: pesi fissi</li>
<li><b>Regole chiare</b>: nessun intervento continuo</li>
</ul>
</div>

<!-- VIDEO -->
<div>
<video class="heroVideo" controls playsinline preload="metadata"
poster="/static/sdraio.png">
<source src="/static/video_pigro_v3_migliorato.mp4?v=2" type="video/mp4">
</video>
</div>

</div>

<!-- CONTROLLI -->
<div class="controlsRow">

<div class="card">
<b>Composizione</b><br>
80% LS80<br>
15% Oro<br>
5% Bitcoin
</div>

<div>
<label>Capitale (€)</label><br>
<input id="capital" value="10000">
</div>

<div>
<button class="btn">Aggiorna</button>
<button class="btn">PDF</button>
</div>

<div style="margin-left:auto;">
Finale: <b id="finalValue">—</b>
</div>

</div>

<h2>Andamento</h2>

<div class="card">
<canvas id="chart_main"></canvas>
</div>

</div>

<script src="/static/app.js"></script>

</body>
</html>
